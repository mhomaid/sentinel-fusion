services:
  db:
    build:
      context: .
      dockerfile: docker/Dockerfile.db
    container_name: sentinel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel_secret}
      POSTGRES_DB: ${POSTGRES_DB:-sentinel_fusion}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sentinel} -d ${POSTGRES_DB:-sentinel_fusion}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
